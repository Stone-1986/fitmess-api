validacion_producto:
  epica_id: "EPICA-01"
  fecha: "2026-03-01"
  version: "2.0"
  resumen_ejecutivo: >
    Version 2.0 — Incorpora el estado actualizado de las HU en epica_input.yaml tras el
    CHECKPOINT 1 con el Product Owner. Las condiciones de HU-001 (HABEAS_DATA como documento
    separado, mensaje generico ante duplicados, registro inmutable) y HU-002 (control de
    acceso por rol, limite del motivo de rechazo) quedaron resueltas en los criterios de
    aceptacion del input. HU-001 y HU-002 se promueven a APROBADA. HU-003 mantiene su
    estado APROBADA. La condicion critica no resuelta sigue siendo HU-004: ausencia de
    criterio funcional sobre proteccion contra fuerza bruta en el endpoint de autenticacion,
    obligatoria bajo Ley 1273 de 2009 y estandar OWASP 2025. Se registra un conflicto nuevo
    con el Arquitecto: el plan declara que ThrottlerGuard global (100 req/min) es la
    medida suficiente bajo Ley 1273/2009, pero OWASP 2025 establece que los endpoints de
    login requieren un control especifico por cuenta (3 a 10 intentos), no un rate limiter
    generico por IP que no protege contra ataques distribuidos. Este conflicto requiere
    decision del humano antes de que el Documentador inicie.

  historias_de_usuario:

    - id: "HU-001"
      titulo: "Solicitud de registro como entrenador"
      decision: "APROBADA"
      observaciones: >
        PROMOVIDA a APROBADA (era APROBADA_CON_CONDICIONES en v1.0). Las tres condiciones
        del reporte anterior quedaron resueltas en los criterios de aceptacion actuales.
        CA-5 resuelve la condicion critica: bloqueo ante ausencia de HABEAS_DATA como
        documento independiente de los terminos (Ley 1581/2012 art. 9, Decreto 1377/2013).
        CA-6 cubre registro inmutable en legal_acceptances (Ley 527/1999). CA-7 garantiza
        mensaje generico ante duplicados (anti-enumeracion, Ley 1273/2009). Los 7 criterios
        son verificables. El flujo es coherente con practicas de la industria (HubFit,
        Everfit, PT Distinction).
      guardarrails_aplicables:
        - ley: "Ley 1581 de 2012 + Decreto 1377 de 2013"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. CA-5 garantiza HABEAS_DATA como checkbox independiente."
        - ley: "Circular SIC No. 2 de 2024"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. Finalidad declarada en contexto de la plataforma. AuditInterceptor global cubre accountability."
        - ley: "Ley 1273 de 2009"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. CA-7 garantiza mensaje neutro ante duplicados (anti-enumeracion)."
        - ley: "Ley 527 de 1999"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. CA-6 establece registro inmutable con timestamp, version e identificador."

    - id: "HU-002"
      titulo: "Aprobacion o rechazo de solicitud de entrenador por el Administrador"
      decision: "APROBADA"
      observaciones: >
        PROMOVIDA a APROBADA (era APROBADA_CON_CONDICIONES en v1.0). CA-4 resuelve control
        de acceso exclusivo para Administrador. CA-5 resuelve limite del motivo de rechazo
        (texto libre sin informacion tecnica interna). Los 5 criterios son verificables. Las
        mutaciones de estado son capturadas por el AuditInterceptor global. El plan del
        Arquitecto aclara que el estado REJECTED en login resulta en COACH_NOT_APPROVED (403),
        resolviendo la ambiguedad de v1.0.
      guardarrails_aplicables:
        - ley: "Ley 1581 de 2012"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. CA-4 restringe acceso al listado de solicitudes al rol Administrador."
        - ley: "Circular SIC No. 2 de 2024"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. Finalidad especifica y declarada. AuditInterceptor garantiza accountability."
        - ley: "Ley 1273 de 2009"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. CA-4 previene acceso no autorizado. CA-5 evita exposicion de informacion tecnica."
        - ley: "Ley 527 de 1999"
          aplica: false
          cumple: true
          accion_requerida: "No aplica. La aprobacion administrativa no es un documento contractual bajo Ley 527."

    - id: "HU-003"
      titulo: "Registro inicial del atleta en la plataforma"
      decision: "APROBADA"
      observaciones: >
        Sin cambios respecto a v1.0. La HU cubre correctamente el registro de Fase 1 del
        atleta. CA-3 y CA-4 cubren HABEAS_DATA y TERMS_OF_SERVICE como checkboxes obligatorios
        e independientes. CA-5 cubre registro inmutable. CA-6 cubre mensaje generico ante
        duplicados. HEALTH_DATA_CONSENT NO se solicita en Fase 1 — diferido a EPICA-04 cuando
        se recolectan datos sensibles de salud. Bajo Ley 1581/2012 art. 6 y Decreto 1377/2013,
        el consentimiento para datos sensibles se requiere en el momento de su recoleccion.
        Diseno legalmente correcto.
      guardarrails_aplicables:
        - ley: "Ley 1581 de 2012 + Decreto 1377 de 2013"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. HABEAS_DATA y TERMS_OF_SERVICE independientes. HEALTH_DATA_CONSENT diferido a EPICA-04."
        - ley: "Circular SIC No. 2 de 2024"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. Principio de minimalidad: solo datos de identificacion en Fase 1."
        - ley: "Ley 1273 de 2009"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. CA-6 garantiza mensaje neutro ante duplicados."
        - ley: "Ley 527 de 1999"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. CA-5 establece registro inmutable con timestamp, version e identificador."

    - id: "HU-004"
      titulo: "Inicio de sesion en la plataforma"
      decision: "APROBADA"
      observaciones: >
        PROMOVIDA a APROBADA (era APROBADA_CON_CONDICIONES). El humano resolvio el conflicto
        agregando CA-4: bloqueo temporal por cuenta tras 5 intentos fallidos consecutivos
        durante 15 minutos. CA-1 cubre acceso exitoso por rol. CA-2 cubre credenciales
        incorrectas con mensaje generico anti-enumeracion. CA-3 cubre entrenador pendiente
        (PENDING y REJECTED resultan en COACH_NOT_APPROVED 403). CA-4 cumple Ley 1273/2009
        art. 269A y OWASP 2025 (umbral de 5 intentos dentro del rango recomendado 3-10,
        bloqueo por cuenta no solo por IP). Los 4 criterios son verificables.
      guardarrails_aplicables:
        - ley: "Ley 1273 de 2009"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. CA-4 establece bloqueo por cuenta (5 intentos, 15 min). Satisface OWASP 2025 y Ley 1273/2009."
        - ley: "Ley 1581 de 2012"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. CA-2 garantiza mensaje generico (anti-enumeracion)."
        - ley: "Circular SIC No. 2 de 2024"
          aplica: true
          cumple: true
          accion_requerida: "Cumple. Solo datos necesarios para autenticacion."
        - ley: "Ley 527 de 1999"
          aplica: false
          cumple: true
          accion_requerida: "No aplica. El inicio de sesion no es un contrato bajo Ley 527."

  conflictos_con_arquitecto:
    - hu_afectada: "HU-004"
      descripcion: >
        Conflicto sobre la suficiencia del ThrottlerGuard global como medida de proteccion
        contra fuerza bruta en el endpoint POST /auth/login.
      resolucion: >
        RESUELTO por el humano (2026-03-01). Decision: agregar bloqueo por cuenta
        (5 intentos fallidos consecutivos, bloqueo temporal de 15 minutos). Se acepta
        la posicion del Analista. Nuevo CA-4 agregado a HU-004 en epica_input.yaml.
        El ThrottlerGuard global se mantiene como capa adicional de proteccion por IP,
        pero el control principal es el bloqueo por cuenta.

  escalamiento_requerido: false

  motivo_escalamiento: >
    Resuelto. El humano decidio agregar bloqueo por cuenta (5 intentos, 15 min) como
    CA-4 de HU-004. Conflicto cerrado. El flujo puede continuar.

  notas_adicionales:
    - "RESUELTO v2.0: HU-001 promovida a APROBADA. Condiciones de v1.0 resueltas en criterios de aceptacion."
    - "RESUELTO v2.0: HU-002 promovida a APROBADA. Condiciones de v1.0 resueltas."
    - "RESUELTO: HU-003 APROBADA. HEALTH_DATA_CONSENT diferido a EPICA-04."
    - "RESUELTO: entrenador REJECTED en login recibe COACH_NOT_APPROVED (403)."
    - "RESUELTO v2.1: HU-004 promovida a APROBADA. Humano agrego CA-4: bloqueo por cuenta (5 intentos, 15 min). Conflicto con Arquitecto cerrado."
    - "PENDIENTE: HU adicional para recuperacion de contrasena. Definir antes de cerrar la epica."
