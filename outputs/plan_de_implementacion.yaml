plan_de_implementacion:
  version: "1.0"
  epica_id: "EPICA-01"
  ciclo: 1
  modulos_afectados:
    - "auth (modulo nuevo — src/modules/auth/)"
    - "notifications (listeners para: coach.request.created, coach.request.approved, coach.request.rejected, user.registered)"
    - "common (schema Prisma — nuevas entidades y enums)"

  # ─────────────────────────────────────────────────────────────────────────────
  # PREREQUISITO BLOQUEANTE — MIGRACION PRISMA
  # El humano debe ejecutar pnpm prisma migrate dev con los siguientes cambios:
  #
  # 1. enum UserRole: agregar ADMIN
  # 2. nuevo enum CoachRequestStatus: PENDING, APPROVED, REJECTED
  # 3. nuevo enum DocumentType: HABEAS_DATA, TERMS_OF_SERVICE,
  #    HEALTH_DATA_CONSENT, SPORT_CONSENT
  # 4. nuevo enum IdentificationType: CC, CE, NIT, PASAPORTE, PPT, PEP
  # 5. nuevo model User:
  #    id (UUID), email (@@unique), passwordHash, role (UserRole),
  #    name, phone, phoneCountryCode, identificationType (IdentificationType),
  #    identificationNumber (@@unique), avatarUrl?, dateOfBirth?,
  #    createdAt, updatedAt
  # 6. nuevo model CoachRequest:
  #    id (UUID), userId (FK User), planDescription, bannerUrl?,
  #    status (CoachRequestStatus @default(PENDING)), rejectionReason?,
  #    reviewedAt?, reviewedBy? (FK User), createdAt, updatedAt
  # 7. nuevo model LegalAcceptance (inmutable — sin update ni delete):
  #    id (UUID), userId (FK User), documentType (DocumentType),
  #    documentVersion, ip, userAgent, planId?, acceptedAt (@default(now()))
  # 8. nuevo model AuditLog:
  #    id (UUID), userId?, ip, userAgent, method, url,
  #    statusCode?, duration, correlationId?, error?, createdAt (@default(now()))
  #    @@index([userId]) @@index([correlationId])
  # 9. nuevo model RefreshToken:
  #    id (UUID), userId (FK User), tokenHash,
  #    expiresAt, revokedAt?, createdAt (@default(now()))
  #
  # NOTA DE DISENO:
  # Los campos personales compartidos (name, phone, phoneCountryCode,
  # identificationNumber, identificationType, avatarUrl, dateOfBirth) van en User.
  # CoachRequest solo tiene datos propios de la solicitud (planDescription, bannerUrl).
  # @@unique constraints en email e identificationNumber estan en User para garantizar
  # unicidad global independientemente del rol.
  # ─────────────────────────────────────────────────────────────────────────────

  endpoints:

    # ── HU-001: Solicitud de registro como entrenador ──────────────────────────

    - hu_id: "HU-001"
      metodo: POST
      ruta: /auth/coaches/register
      proposito: >
        Registrar solicitud de nuevo entrenador. Crea User con role COACH en estado
        no aprobado y CoachRequest en estado PENDING dentro de una $transaction atomica.
        Registra dos LegalAcceptances: TERMS_OF_SERVICE y HABEAS_DATA como registros
        separados e independientes (Ley 1581/2012). Emite coach.request.created para
        que el modulo de notifications notifique al administrador. Ante email o
        identificationNumber duplicado retorna 409 con mensaje neutro (anti-enumeracion).
      request_body: RegisterCoachDto
      response: "CoachRequestResponseDto (201)"
      errores: [400, 409]
      guards: []
      eventos:
        - coach.request.created
      dependencias: []

    # ── HU-002: Aprobacion o rechazo de solicitud por el Administrador ─────────

    - hu_id: "HU-002"
      metodo: POST
      ruta: /coach-requests/search
      proposito: >
        Buscar y listar solicitudes de entrenadores con filtros opcionales y combinables
        (AND logico). Body vacio retorna todas las solicitudes con paginacion por defecto.
        Soporta filtros: uuid[] (lista de IDs), status[] (lista de estados),
        email (exacto), nombre (parcial ILIKE), identificationNumber (exacto),
        createdAt (fecha ISO). Exclusivo para ADMIN.
      request_body: SearchCoachRequestsDto
      response: "CoachRequestSummaryResponseDto[] + PaginationMeta (200)"
      errores: [400, 401, 403]
      guards:
        - JwtAuthGuard
        - RolesGuard(ADMIN)
      eventos: []
      dependencias: []

    - hu_id: "HU-002"
      metodo: GET
      ruta: /coach-requests/:id
      proposito: >
        Obtener detalle completo de una solicitud de entrenador por UUID. Incluye
        todos los datos del coach solicitante (nombre, email, avatarUrl, bannerUrl,
        planDescription, identificationNumber, status) para revision del administrador.
        ParseUUIDPipe en :id.
      request_body: null
      response: "CoachRequestDetailResponseDto (200)"
      errores: [401, 403, 404]
      guards:
        - JwtAuthGuard
        - RolesGuard(ADMIN)
      eventos: []
      dependencias: []

    - hu_id: "HU-002"
      metodo: POST
      ruta: /coach-requests/:id/approve
      proposito: >
        Transicionar CoachRequest de PENDING a APPROVED. State machine: solo PENDING
        puede aprobarse — APPROVED o REJECTED lanzan INVALID_STATE_TRANSITION (409).
        Registra reviewedAt y reviewedBy (id del admin). Habilita al entrenador para
        operar en la plataforma. Emite coach.request.approved para notificar al coach.
        ParseUUIDPipe en :id.
      request_body: null
      response: "CoachRequestResponseDto (200)"
      errores: [401, 403, 404, 409]
      guards:
        - JwtAuthGuard
        - RolesGuard(ADMIN)
      eventos:
        - coach.request.approved
      dependencias:
        - GET /coach-requests/:id

    - hu_id: "HU-002"
      metodo: POST
      ruta: /coach-requests/:id/reject
      proposito: >
        Transicionar CoachRequest de PENDING a REJECTED con motivo obligatorio.
        State machine: solo PENDING puede rechazarse — APPROVED o REJECTED lanzan
        INVALID_STATE_TRANSITION (409). Persiste el motivo de rechazo (texto libre,
        sin incluir informacion tecnica interna). Emite coach.request.rejected con
        motivo para notificar al coach. ParseUUIDPipe en :id.
      request_body: RejectCoachRequestDto
      response: "CoachRequestResponseDto (200)"
      errores: [400, 401, 403, 404, 409]
      guards:
        - JwtAuthGuard
        - RolesGuard(ADMIN)
      eventos:
        - coach.request.rejected
      dependencias:
        - GET /coach-requests/:id

    # ── HU-003: Registro inicial del atleta ────────────────────────────────────

    - hu_id: "HU-003"
      metodo: POST
      ruta: /auth/register
      proposito: >
        Registrar nuevo atleta en Fase 1 (exploracion). Crea User con role ATHLETE
        dentro de una $transaction atomica junto con dos LegalAcceptances: HABEAS_DATA
        y TERMS_OF_SERVICE como registros separados e independientes (Ley 1581/2012 —
        checkbox separado). HEALTH_DATA_CONSENT NO aplica en Fase 1 — se difiere a la
        inscripcion al plan (EPICA-04). Ante email o identificationNumber duplicado
        retorna 409 con mensaje neutro (anti-enumeracion). Emite user.registered.
      request_body: RegisterAthleteDto
      response: "AthleteRegistrationResponseDto (201)"
      errores: [400, 409]
      guards: []
      eventos:
        - user.registered
      dependencias: []

    # ── HU-004: Inicio de sesion ────────────────────────────────────────────────

    - hu_id: "HU-004"
      metodo: POST
      ruta: /auth/login
      proposito: >
        Autenticar usuario registrado (atleta, entrenador o administrador) por email
        + password via Passport LocalStrategy. Valida credenciales primero — si son
        incorrectas lanza INVALID_CREDENTIALS (401) con mensaje identico para email
        inexistente y password incorrecto (anti-enumeracion). Si el entrenador tiene
        CoachRequest en estado PENDING o REJECTED lanza COACH_NOT_APPROVED (403).
        Implementa bloqueo por cuenta: tras 5 intentos fallidos consecutivos, la cuenta
        se bloquea temporalmente durante 15 minutos y retorna ACCOUNT_TEMPORARILY_LOCKED
        (429) con mensaje informativo. El contador de intentos se resetea tras un login
        exitoso o al expirar el periodo de bloqueo. ThrottlerGuard global se mantiene
        como capa adicional de proteccion por IP. Retorna accessToken JWT y refreshToken.
      request_body: LoginDto
      response: "AuthTokenResponseDto (200)"
      errores: [400, 401, 403, 429]
      guards:
        - LocalAuthGuard
      eventos: []
      dependencias:
        - POST /auth/register
        - POST /auth/coaches/register

  orden_de_implementacion:
    - "1. [PREREQUISITO BLOQUEANTE] Migracion Prisma — el humano ejecuta pnpm prisma migrate dev"
    - "2. POST /auth/register (HU-003) — fundacion: crea el modelo User para atletas; primera entidad del modulo"
    - "3. POST /auth/coaches/register (HU-001) — extiende User para el rol COACH; agrega CoachRequest"
    - "4. POST /auth/login (HU-004) — requiere Users existentes; implementa LocalStrategy y JwtStrategy"
    - "5. POST /coach-requests/search (HU-002) — listado con filtros; requiere User con role ADMIN en BD para testear"
    - "6. GET /coach-requests/:id (HU-002) — detalle individual; base para las acciones de estado"
    - "7. POST /coach-requests/:id/approve (HU-002) — state machine PENDING→APPROVED"
    - "8. POST /coach-requests/:id/reject (HU-002) — state machine PENDING→REJECTED"

  decisiones_arquitectonicas:

    - decision: >
        Modulo auth/ contiene dos controllers: AuthController (/auth) y
        CoachRequestsController (/coach-requests).
      justificacion: >
        /auth/* son endpoints publicos de autenticacion (sin JwtAuthGuard).
        /coach-requests/* son endpoints privados administrativos (JwtAuthGuard + RolesGuard(ADMIN)).
        Separar controllers mantiene cohesion. Ambos pertenecen a EPICA-01 y al dominio
        de acceso, por lo que viven en el mismo modulo auth/.

    - decision: >
        Campos personales compartidos (name, phone, phoneCountryCode,
        identificationNumber, identificationType, avatarUrl, dateOfBirth) van en
        el modelo User, no en CoachRequest.
      justificacion: >
        Atletas y coaches comparten los mismos campos de identificacion personal.
        Mantenerlos en User evita duplicacion y garantiza las constraints de unicidad
        global (@@unique([email]), @@unique([identificationNumber])) independientemente
        del rol. CoachRequest solo tiene datos propios de la solicitud del entrenador:
        planDescription y bannerUrl.

    - decision: >
        Nuevo enum IdentificationType en Prisma: CC, CE, NIT, PASAPORTE, PPT, PEP.
      justificacion: >
        La restriccion conocida de la epica exige tipo de documento obligatorio.
        Los valores cubren los tipos de documento principales en Colombia (CC, CE, NIT)
        y para extranjeros residentes (PPT, PEP) y viajeros (PASAPORTE).

    - decision: >
        HEALTH_DATA_CONSENT no se registra en el registro del atleta (HU-003).
        Se difiere a la inscripcion al plan (EPICA-04).
      justificacion: >
        Restriccion explicita de la epica: en Fase 1 el atleta NO proporciona datos
        de salud. El consentimiento para RPE, dolor muscular y motivacion aplica cuando
        el atleta se suscribe a un plan. Solo HABEAS_DATA y TERMS_OF_SERVICE son
        obligatorios en el registro inicial.

    - decision: >
        POST /coach-requests/search con body JSON en lugar de GET con query params.
      justificacion: >
        Los filtros requeridos incluyen arrays (uuid[], status[]) y combinaciones
        multiples. Query params no soportan arrays de forma estandarizada y limpia.
        El body JSON permite expresar la complejidad sin ambiguedad. POST para busqueda
        es valido cuando la complejidad de los filtros excede la capacidad de la URL.

    - decision: >
        State machine de CoachRequest: tres estados (PENDING, APPROVED, REJECTED).
        Las transiciones son endpoints POST separados: /approve y /reject.
      justificacion: >
        Semantica REST clara: cada transicion tiene sus propias validaciones, errores y
        eventos. Una transicion desde estado ya resuelto (APPROVED→APPROVED o
        REJECTED→APPROVED) lanza BusinessError.INVALID_STATE_TRANSITION (409).
        Enum en Prisma + metodo por transicion en service (patron del proyecto).

    - decision: >
        POST /auth/login usa LocalAuthGuard (Passport LocalStrategy) en lugar de
        JwtAuthGuard. La verificacion de COACH_NOT_APPROVED ocurre en AuthService,
        no en un guard separado.
      justificacion: >
        Passport LocalStrategy valida email+password y popula request.user antes de
        llegar al controller. La verificacion del estado del coach requiere que el
        usuario exista y sea identificado primero — no puede delegarse a un guard
        sin revelar informacion (anti-enumeracion). El service maneja la secuencia:
        (1) validar credenciales, (2) verificar estado del coach.

    - decision: >
        Las transacciones $transaction de Prisma agrupan User + LegalAcceptances
        en una operacion atomica en ambos endpoints de registro.
      justificacion: >
        Si el registro del usuario falla despues de crear las aceptaciones legales,
        quedarian registros LegalAcceptance huerfanos sin userId valido. La atomicidad
        es critica para Ley 527/1999 (integridad del documento legal). Si alguna
        operacion falla, ningun registro persiste.

    - decision: >
        Los eventos coach.request.approved y coach.request.rejected no existen en el
        catalogo de design-patterns y deben ser agregados antes de la documentacion.
      justificacion: >
        HU-002 requiere notificacion al coach en ambas transiciones de estado.
        El catalogo existente tiene coach.request.created pero no los eventos de
        resolucion. El Documentador no puede proceder sin estas entradas en el catalogo.

    - decision: >
        avatarUrl y bannerUrl se almacenan como URLs string. La API no gestiona uploads.
      justificacion: >
        El cliente realiza el upload a un servicio externo (storage) y envia la URL
        resultante al API. Si el producto requiere uploads directos, se necesita una
        HU adicional en una epica de infraestructura.

    - decision: >
        RefreshToken se incluye en el schema Prisma con campo tokenHash pero el endpoint
        POST /auth/refresh no tiene HU en EPICA-01 y no se planifica.
      justificacion: >
        El modelo se incluye en la migracion inicial para no requerir una migracion
        adicional cuando se defina la HU de refresh. El endpoint no se implementa
        hasta que tenga HU con criterios de aceptacion formales.

    - decision: >
        Ante email o identificationNumber duplicado en el registro (atleta y coach),
        la respuesta es 409 DUPLICATE_ENTITY con mensaje neutro. No se confirma
        ni se niega si el dato especifico (email o numero) esta tomado.
      justificacion: >
        Los criterios de aceptacion de HU-001 y HU-003 lo exigen explicitamente.
        Ley 1273/2009 — seguridad de la informacion: revelar que un email especifico
        esta registrado permite enumeracion de usuarios. El mensaje es generico:
        "Estos datos ya estan registrados en la plataforma."

  criterios_de_aceptacion_tecnicos:
    - "Cobertura de dominio (AuthService, CoachRequestsService) >= 80%"
    - "Cobertura de adaptadores (AuthController, CoachRequestsController) >= 70%"
    - "Todos los endpoints documentan sus errores con @ApiProblemResponse"
    - "Endpoints publicos (/auth/coaches/register, /auth/register, /auth/login) usan security: [] en el contrato OpenAPI"
    - "Spectral: fitmess-auth-401-operation pasa en todos los endpoints con JwtAuthGuard"
    - "LegalAcceptance: el service no expone metodos update ni delete (inmutabilidad por diseno)"
    - "Passwords hasheados con bcrypt minimo 10 rondas antes de persistir en User.passwordHash"
    - "LocalStrategy: mensaje de error identico para email inexistente y password incorrecto (INVALID_CREDENTIALS 401)"
    - "AuthService.login() nunca loggea password, accessToken ni refreshToken"
    - "State machine CoachRequest: transicion desde APPROVED o REJECTED lanza BusinessError.INVALID_STATE_TRANSITION (409)"
    - "Registro atomico del atleta: User + LegalAcceptance(HABEAS_DATA) + LegalAcceptance(TERMS_OF_SERVICE) en $transaction"
    - "Registro atomico del coach: User + CoachRequest + LegalAcceptance(TERMS_OF_SERVICE) + LegalAcceptance(HABEAS_DATA) en $transaction"
    - "Los eventos coach.request.approved y coach.request.rejected deben estar en el catalogo de design-patterns antes de que el Documentador inicie"
    - "RolesGuard(ADMIN) en todos los endpoints bajo /coach-requests"
    - "ParseUUIDPipe en todos los parametros :id"
    - "HEALTH_DATA_CONSENT ausente del registro del atleta (HU-003) — solo HABEAS_DATA y TERMS_OF_SERVICE"
    - "Bloqueo por cuenta en POST /auth/login: 5 intentos fallidos consecutivos bloquean la cuenta 15 minutos (ACCOUNT_TEMPORARILY_LOCKED 429)"
    - "El contador de intentos fallidos se resetea tras login exitoso o al expirar el periodo de bloqueo"
    - "Nuevo BusinessError requerido: ACCOUNT_TEMPORARILY_LOCKED (429) — agregar al catalogo en common/exceptions/"

  riesgos_identificados:
    - >
      BLOQUEANTE — Schema Prisma sin entidades de dominio: el schema actual tiene
      solo 3 enums y cero modelos de dominio. Ningun endpoint puede implementarse
      hasta que el humano aplique la migracion con User, CoachRequest, LegalAcceptance,
      AuditLog, RefreshToken y los 4 enums nuevos (UserRole+ADMIN, CoachRequestStatus,
      DocumentType, IdentificationType).

    - >
      BLOQUEANTE PARCIAL — Dos eventos no estan en el catalogo de design-patterns:
      coach.request.approved y coach.request.rejected. El Documentador requiere estas
      entradas para generar los decoradores del contrato OpenAPI de HU-002. Deben
      agregarse al catalogo antes de que el Documentador inicie.

    - >
      MEDIO — POST /auth/refresh sin HU: los tokens JWT expiran. Sin endpoint de
      refresh, los usuarios deben re-autenticarse manualmente. La tabla RefreshToken
      esta en el schema pero el endpoint no tiene HU en EPICA-01. Escalar al Product
      Owner para definir si es una HU adicional en EPICA-01 o en una epica futura.

    - >
      BAJO — Busqueda parcial por nombre en POST /coach-requests/search usa ILIKE
      %valor%. Sin indice GIN en la columna name de User, puede ser lento en tablas
      grandes. Evaluar cuando la base de entrenadores crezca.

    - >
      BAJO — avatarUrl y bannerUrl asumidos como URLs externas sin validacion de
      dominio. Si el cliente envia URLs de dominios no autorizados, se persisten sin
      verificacion. Considerar whitelist de dominios en una iteracion futura.
