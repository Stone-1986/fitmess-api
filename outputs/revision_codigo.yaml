      como 'warn' en eslint.config.mjs (no 'error'). Distribuidos en: guard specs (4),
      prisma-exception.filter.ts (1), test/auth.e2e-spec.ts (27). Ninguno en codigo
      de produccion critico. Aceptable — no bloquea.

  cobertura:
