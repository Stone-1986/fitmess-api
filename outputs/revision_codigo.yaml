    ejecutado: false
    motivo_no_ejecucion: >
      Sin commits git (todos los archivos untracked). Motivo valido.
    hallazgos_confirmados: 0
    hallazgos_descartados_validados: 2
    notas: >
      Vulnerabilidad BAJA 1: context.requestStatus en COACH_NOT_APPROVED.
      Descarte del QA validado — ProblemDetailFilter no serializa context.
      Vulnerabilidad BAJA 2: LocalAuthGuard sin handleRequest(). CORREGIDA
      en este ciclo — handleRequest() agregado.

  estado: "APROBADO"
