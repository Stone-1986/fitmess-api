epica:
  id: "EPICA-01"
  titulo: "Gestion de Acceso y Cumplimiento Legal"
  objetivo_de_negocio: >
    Garantizar que todos los usuarios ingresen a la plataforma bajo condiciones legales
    validas (Ley 1581/2012 Colombia), con identidades verificadas y roles correctamente
    asignados.
  contexto_de_aplicacion: >
    Plataforma de entrenamiento deportivo personalizado con tres actores: Atleta, Entrenador
    y Administrador. El entrenador se registra por auto-registro y requiere aprobacion
    administrativa. El atleta pasa por dos fases: Fase 1 (registro y exploracion) y Fase 2
    (inscripcion a un plan con aprobacion del entrenador). En Fase 1 el atleta NO proporciona
    datos de salud — solo datos personales de identificacion. La autenticacion es por
    credenciales (email + contrasena) con control de acceso por rol. Marco regulatorio
    colombiano: Ley 1581 de 2012 (proteccion de datos personales y datos sensibles de salud).
  restricciones_conocidas:
    - "email e identificationNumber son los identificadores unicos de cada usuario — no puede haber 2 usuarios con el mismo email ni con el mismo identificationNumber"
    - "Todos los usuarios deben registrar tipo de documento (identificationType: CC, CE, NIT, PASAPORTE, etc.) y numero de identificacion (identificationNumber)"
    - "El telefono debe incluir indicativo de pais (phoneCountryCode, ej: +57 para Colombia)"
    - "Ley 1581 de 2012: la autorizacion de datos sensibles de salud requiere checkbox separado e independiente de la autorizacion general de datos personales"
    - "Cada aceptacion legal debe registrarse con timestamp, version del documento y el identificador del usuario"
    - "Un entrenador no aprobado por el administrador no puede acceder a las funcionalidades de la plataforma"
    - "En Fase 1 (registro) el atleta NO proporciona datos de salud — la autorizacion de datos sensibles de salud (HEALTH_DATA_CONSENT) se difiere a la inscripcion al plan (EPICA-04)"
    - "El mecanismo de recuperacion de contrasena no esta descrito en el documento fuente; se documenta como supuesto para confirmar y definir como HU adicional si aplica"
  historias_de_usuario:
    - id: "HU-001"
      titulo: "Solicitud de registro como entrenador"
      como: "entrenador o representante de un centro de entrenamiento"
      quiero: "completar un formulario de solicitud de registro en la plataforma"
      para: "que el administrador evalue mi perfil y me habilite para operar"
      criterios_de_aceptacion:
        - "Dado que un entrenador accede al formulario de solicitud de registro, cuando completa nombre, email, indicativo de pais del telefono, telefono, tipo de documento, numero de identificacion y descripcion del plan, acepta los terminos y condiciones y la autorizacion de tratamiento de datos personales, y envia la solicitud, entonces ve un mensaje confirmando que su solicitud fue recibida y que sera revisada por el administrador, y el administrador recibe una notificacion de nueva solicitud pendiente"
        - "Dado que un entrenador esta completando el formulario de solicitud, cuando intenta enviar sin haber completado uno o mas campos obligatorios, entonces ve indicados los campos faltantes con mensaje de dato requerido, y el envio no se realiza"
        - "Dado que un entrenador esta completando el formulario de registro, cuando adjunta una imagen de avatar y una imagen de banner antes de enviar, entonces esas imagenes quedan asociadas a su solicitud para ser revisadas por el administrador"
        - "Dado que un entrenador completo todos los campos obligatorios del formulario, cuando intenta enviar la solicitud sin haber aceptado los terminos y condiciones, entonces ve un mensaje indicando que la aceptacion de terminos es obligatoria, y el envio no se realiza"
        - "Dado que un entrenador completo todos los campos obligatorios del formulario, cuando intenta enviar la solicitud sin haber aceptado la autorizacion de tratamiento de datos personales (habeas data), entonces ve un mensaje indicando que la aceptacion es obligatoria, y el envio no se realiza"
        - "Dado que un entrenador completo el registro exitosamente, cuando el sistema registra las aceptaciones legales, entonces quedan almacenados TERMS_OF_SERVICE y HABEAS_DATA en legal_acceptances con timestamp, version del documento e identificador del usuario"
        - "Dado que un entrenador intenta registrarse con un email o numero de identificacion que ya existe en el sistema, cuando envia la solicitud, entonces el sistema devuelve un mensaje generico sin confirmar ni negar la existencia de un registro previo con esos datos"

    - id: "HU-002"
      titulo: "Aprobacion o rechazo de solicitud de entrenador por el Administrador"
      como: "administrador"
      quiero: "revisar las solicitudes de registro de entrenadores pendientes y aprobarlas o rechazarlas"
      para: "controlar quienes pueden operar en la plataforma"
      criterios_de_aceptacion:
        - "Dado que existe una solicitud de entrenador en estado pendiente, cuando el administrador revisa el perfil y aprueba la solicitud, entonces el entrenador queda habilitado para operar en la plataforma, y el entrenador recibe una notificacion indicando que su solicitud fue aprobada"
        - "Dado que existe una solicitud de entrenador en estado pendiente, cuando el administrador rechaza la solicitud indicando el motivo, entonces la solicitud queda en estado rechazado, y el entrenador recibe una notificacion con el motivo del rechazo"
        - "Dado que el administrador accede al panel de gestion de entrenadores, cuando busca solicitudes con criterios de filtrado opcionales (UUID, estado, email, nombre, numero de identificacion, fecha de creacion), entonces ve el listado filtrado que coincide con los criterios. Si no envia ningun filtro, ve todas las solicitudes. Los filtros son combinables entre si"
        - "Dado que el administrador accede al panel de gestion de entrenadores, cuando un usuario con cualquier otro rol intenta acceder, entonces recibe respuesta de acceso denegado"
        - "Dado que el administrador rechaza una solicitud, cuando el motivo de rechazo se incluye en la notificacion al entrenador, entonces el motivo es texto libre ingresado por el administrador sin exponer informacion tecnica interna ni datos de otros solicitantes"

    - id: "HU-003"
      titulo: "Registro inicial del atleta en la plataforma"
      como: "persona interesada en entrenar"
      quiero: "registrarme como atleta en la plataforma"
      para: "poder explorar los planes y entrenadores disponibles"
      criterios_de_aceptacion:
        - "Dado que un visitante accede al formulario de registro de atleta, cuando completa nombre, email, contrasena, indicativo de pais del telefono, telefono, tipo de documento, numero de identificacion, fecha de nacimiento y opcionalmente adjunta avatar, entonces queda registrado como atleta en Fase 1 con acceso de exploracion, y puede navegar el catalogo de entrenadores y planes publicados"
        - "Dado que un visitante esta completando el formulario de registro, cuando intenta confirmar sin completar uno o mas campos obligatorios, entonces ve los campos faltantes indicados con mensaje de dato requerido, y el registro no se completa"
        - "Dado que un visitante esta completando el formulario de registro de atleta, cuando intenta confirmar el registro sin haber aceptado la autorizacion de tratamiento de datos personales (habeas data), entonces ve un mensaje indicando que la aceptacion es obligatoria para continuar, y el registro no se completa"
        - "Dado que un visitante esta completando el formulario de registro de atleta, cuando intenta confirmar el registro sin haber aceptado los terminos y condiciones, entonces ve un mensaje indicando que la aceptacion es obligatoria para continuar, y el registro no se completa"
        - "Dado que un atleta completo el registro exitosamente, cuando el sistema registra la aceptacion de los documentos legales, entonces queda almacenado HABEAS_DATA y TERMS_OF_SERVICE en legal_acceptances con timestamp, version del documento e identificador del usuario"
        - "Dado que un visitante intenta registrarse con un email o numero de identificacion que ya existe en el sistema, cuando envia el formulario, entonces el sistema devuelve un mensaje generico sin confirmar ni negar la existencia de un registro previo con esos datos"

    - id: "HU-004"
      titulo: "Inicio de sesion en la plataforma"
      como: "usuario registrado (atleta, entrenador o administrador)"
      quiero: "iniciar sesion con mis credenciales"
      para: "acceder a las funcionalidades correspondientes a mi rol"
      criterios_de_aceptacion:
        - "Dado que un usuario registrado accede a la pantalla de inicio de sesion, cuando ingresa sus credenciales correctas y confirma, entonces accede al area de la plataforma correspondiente a su rol"
        - "Dado que un usuario esta en la pantalla de inicio de sesion, cuando ingresa credenciales incorrectas, entonces ve un mensaje indicando que el usuario o la contrasena son incorrectos, y no se le concede acceso"
        - "Dado que un entrenador cuya solicitud aun no ha sido aprobada intenta iniciar sesion, cuando ingresa sus credenciales, entonces ve un mensaje informando que su solicitud esta pendiente de revision por el administrador"
        - "Dado que un usuario ha fallado 5 intentos consecutivos de inicio de sesion en su cuenta, cuando intenta iniciar sesion nuevamente, entonces el sistema bloquea temporalmente los intentos de autenticacion para esa cuenta durante 15 minutos y el usuario ve un mensaje informando que su cuenta esta temporalmente bloqueada por multiples intentos fallidos"
